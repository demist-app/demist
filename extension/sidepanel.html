<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      background: #080810;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.7);
    }

    #status {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.recording {
      background: #ef4444;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    #status-text { color: #4b5563; font-size: 12px; }

    #controls {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #record-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: 12px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: rgba(139,92,246,0.15);
      border: 1px solid rgba(139,92,246,0.3);
      color: #a78bfa;
    }
    #record-btn:hover { background: rgba(139,92,246,0.22); }
    #record-btn.recording {
      background: rgba(239,68,68,0.12);
      border-color: rgba(239,68,68,0.3);
      color: #f87171;
    }
    #record-btn.recording:hover { background: rgba(239,68,68,0.2); }
    #record-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .btn-dot.anim { animation: pulse 1.4s ease-in-out infinite; }

    #clear-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #374151;
      font-size: 11px;
      cursor: pointer;
      padding: 8px 10px;
      transition: color 0.15s, border-color 0.15s;
    }
    #clear-btn:hover { color: #6b7280; border-color: rgba(255,255,255,0.14); }

    #body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 10px;
    }
    .empty-icon { font-size: 36px; }
    .empty-title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5); }
    .empty-sub { font-size: 12px; color: #374151; line-height: 1.6; }

    #terms {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .term-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .term-card.fresh {
      border-color: rgba(139,92,246,0.35);
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    .term-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 5px; }
    .term-def  { font-size: 12px; color: #9ca3af; line-height: 1.55; }
    .term-time { font-size: 10px; color: #1f2937; margin-top: 7px; }
  </style>
</head>
<body>
  <div id="header">
    <span class="brand">Demist</span>
    <div id="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>

  <div id="controls">
    <button id="record-btn">
      <span class="btn-dot" id="btn-dot"></span>
      <span id="record-btn-text">Start session</span>
    </button>
    <button id="clear-btn">Clear</button>
  </div>

  <div id="body">
    <div id="empty">
      <div class="empty-icon">🎧</div>
      <p class="empty-title">No terms yet</p>
      <p class="empty-sub">Hit Start session above. Terms appear here as your lecturer speaks.</p>
    </div>
    <div id="terms" style="display:none"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
